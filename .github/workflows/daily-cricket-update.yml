name: Daily Cricket Update

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-cricket-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Verify OpenAI secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::Missing OPENAI_API_KEY repository secret"
            exit 1
          fi

      - name: Update cricket content with Codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          codex --search --ask-for-approval never exec \
            --model gpt-5.3-codex \
            --sandbox workspace-write \
            --cd "$GITHUB_WORKSPACE" \
            --output-last-message "$RUNNER_TEMP/codex-cricket-summary.txt" \
            - < .github/prompts/daily-cricket-update.md

      - name: Commit and push changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No cricket changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Daily cricket content update"
          git push
